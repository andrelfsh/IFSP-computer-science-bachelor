<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Three.js Futebol</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #333; }
        .controls { 
            position: absolute; top: 10px; left: 10px; z-index: 10;
        }
        button { 
            padding: 10px; margin-right: 5px; cursor: pointer;
        }
        #linha-divisoria {
            position: absolute;
            top: 0;
            left: 50%;
            width: 2px;
            height: 100vh;
            background-color: white;
            z-index: 5;
            display: none; /* Inicia escondida */
        }
    </style>
</head>
<body>

    <div class="controls">
        <button id="btn-panoramica">Visão Panorâmica</button>
        <button id="btn-individual">Tela Dividida</button>
    </div>
    
    <div id="linha-divisoria"></div>

    <script type="module" src="./src/main.js"></script>
</body>
</html>
